<svg xmlns="http://www.w3.org/2000/svg" viewBox="-24 -50 48 54" width="48" height="54">

  <!-- Shadow -->
  <ellipse cx="0" cy="2" rx="20" ry="4" fill="rgba(0,0,0,0.15)"/>

  <!-- Feet -->
  <ellipse cx="-8" cy="2" rx="6"  ry="5" fill="#c8960a"/>
  <ellipse cx="8"  cy="2" rx="6"  ry="5" fill="#c8960a"/>

  <!-- Stick -->
  <rect x="-4" y="-6" width="8" height="22" rx="3" fill="#c8a050"/>
  <!-- Stick shine -->
  <rect x="-2" y="-5" width="3" height="18" rx="2" fill="rgba(255,230,170,0.5)"/>

  <!-- Lolly outer circle -->
  <circle cx="0" cy="-27" r="21" fill="#ffeb19"/>



  <!-- Shine -->
  <ellipse cx="-8" cy="-37" rx="6" ry="4" fill="rgba(255,255,255,0.6)"/>

  <!-- Eye whites -->
  <ellipse cx="-8" cy="-28" rx="4.5" ry="5" fill="#ffffff"/>
  <ellipse cx="8"  cy="-28" rx="4.5" ry="5" fill="#ffffff"/>
  <!-- Irises (dark) -->
  <ellipse cx="-8" cy="-27" rx="3"   ry="3.5" fill="#7a5500"/>
  <ellipse cx="8"  cy="-27" rx="3"   ry="3.5" fill="#7a5500"/>
  <!-- Pupils -->
  <ellipse cx="-8" cy="-27" rx="1.8" ry="2"   fill="#141414"/>
  <ellipse cx="8"  cy="-27" rx="1.8" ry="2"   fill="#141414"/>
  <!-- Eye shine -->
  <ellipse cx="-7" cy="-29" rx="1.2" ry="1.2" fill="#ffffff"/>
  <ellipse cx="9"  cy="-29" rx="1.2" ry="1.2" fill="#ffffff"/>

  <!-- Angry brows -->
  <line x1="-12" y1="-35" x2="-4"  y2="-32" stroke="#b09010" stroke-width="2.5"/>
  <line x1="4"   y1="-32" x2="12"  y2="-35" stroke="#b09010" stroke-width="2.5"/>

  <!-- Grumpy mouth -->
  <line x1="-8" y1="-19" x2="-2" y2="-17" stroke="#b09010" stroke-width="2"/>
  <line x1="2"  y1="-17" x2="8"  y2="-19" stroke="#b09010" stroke-width="2"/>

</svg>
